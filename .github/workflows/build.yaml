name: Airoha EN7523 build
run-name: Airoha EN7523 build - ${{ github.run_number }} (${{ github.run_id }}) - Actor ${{ github.actor || 'Unknown' }}

on:
  push:
  schedule:
    - cron: 0 15 */3 * *
  workflow_dispatch:
    inputs:
      verbose:
        type: choice
        required: false
        default: "s"
        description: Openwrt build verbose level
        options:
          - "none"
          - "sc"
          - "s"

concurrency:
  cancel-in-progress: true
  group: airoha_en7523_build-${{ github.ref }}

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  build_openwrt:
    name: Build Openwrt
    uses: ./.github/workflows/generic.yaml
    with:
      verbose: ${{ github.event_name == 'workflow_dispatch' && inputs.verbose || 's' }}
      # Static config
      config_file: en7523
      files_folder: en7523_files
      openwrt_repository: Sirherobrine23/openwrt
      openwrt_repository_ref: airoha_en7523

  release:
    name: Create Release
    needs: build_openwrt
    runs-on: ubuntu-latest
    steps:
      - name: Download actifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts_en7523.tar.xz

      - name: Uncompress build artifacts
        run: |
          xz -d artifacts_en7523.tar.xz
          tar -xvf artifacts_en7523.tar

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: Build Action ${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body_path: release_body.md
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            build.tar.*
            bin/targets/**/*

      - name: Sirherobrine23 Create release
        uses: akkuman/gitea-release-action@main
        with:
          name: Build Action ${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body_path: release_body.md
          server_url: https://sirherobrine23.com.br
          repository: airoha_en7523/builds
          token: ${{ secrets.GITEA_TOKEN }}
          files: |
            build.tar.*
            bin/targets/**/*