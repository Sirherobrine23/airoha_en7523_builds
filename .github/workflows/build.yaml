name: Airoha en7523 build
on:
  push:
  schedule:
    - cron: 0 15 */3 * *
  workflow_dispatch:
    inputs:
      verbose:
        type: choice
        required: false
        default: "s"
        description: Openwrt build verbose level
        options:
          - "none"
          - "sc"
          - "s"

jobs:
  openwrt_build:
    secrets: inherit
    uses: ./.github/workflows/openwrt-build.yaml
    name: Build to en7523
    runs-on: ubuntu-latest-nonroot
    with:
       openwrt_repository: airoha_en7523/openwrt
       make_jobs: "2"
       verbose: ${{ github.event_name == 'workflow_dispatch' && (inputs.verbose == 'none' && '' || inputs.verbose) || 'sc' }}
       config_file: en7523

  release:
    runs-on: ubuntu-latest
    needs: openwrt_build
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: ./
          # merge-multiple: true
          # pattern: target_*

      - run: |
          rm -rf logs_*
          tar -cvpf target.tar target_*
          xz -v9e target.tar
          find . -name packages -type d | xargs rm -rfv

      - name: Create release
        uses: akkuman/gitea-release-action@main
        with:
          name: v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          body: |
              # EN7523 [Build](/actions/runs/${{ github.run_number }})

              build targets

              - tplink xx230v v1
              - tplink xx530v v1
              - tplink ex530v v1
          files: |
            target.tar.*
            target_*/**/*
